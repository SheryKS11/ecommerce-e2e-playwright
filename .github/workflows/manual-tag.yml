name: Test by Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Select tag to run'
        required: true
        type: choice
        options:
          - smoke
          - e2e
          - positive
          - negative
          - functional
          - boundary
          - reliability
          - compatibility
          - all

jobs:
  run-tag:
    runs-on: ubuntu-latest
    env:
      HEADLESS: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run selected tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ "$TAG" = "all" ]; then
            npx cucumber-js --config cucumber.config.js --tags "not @bad-wait"
          elif [ "$TAG" = "reliability" ]; then
            npx cucumber-js --config cucumber.config.js --tags "@reliability and not @bad-wait"
          else
            npx cucumber-js --config cucumber.config.js --tags "@$TAG"
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tag-${{ github.event.inputs.tag }}-report
          path: reports/
          retention-days: 14
